<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Portraits · 多模态版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #faf3e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 24px; color: #1f2937; margin-bottom: 4px; }
        .header p { font-size: 14px; color: #6b7280; }
        .chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeInUp 0.3s ease-out;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .ai {
            background: white;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .input-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
        .quick-btns {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            scrollbar-width: none;
        }
        .quick-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 24px;
            white-space: nowrap;
            cursor: pointer;
            font-size: 15px;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .quick-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .image-preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 16px;
        }
        .image-preview {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-btn {
            padding: 14px;
            background: #e5e7eb;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            color: #4b5563;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-btn:hover { background: #d1d5db; }
        .input-box {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        textarea {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
            min-height: 52px;
        }
        textarea:focus { border-color: #667eea; }
        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }
        .send-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 18px;
        }
        .typing span {
            width: 10px;
            height: 10px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%,80%,100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .error { background: #fee2e2 !important; color: #dc2626 !important; }
        .system-info {
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
            padding: 10px;
        }
        @media (max-width: 640px) {
            .chat-container { padding: 10px; }
            .message { max-width: 90%; font-size: 14px; }
            .header h1 { font-size: 20px; }
            .quick-btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎓 AI Student Portraits · 多模态版</h1>
        <p>学生AI心理画像分析系统（支持视觉分析）</p>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="warning-box" id="persona-warning">
            ⚠️ 人设文件加载失败，请确保存在 persona.txt 文件。
        </div>
        </div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <div class="top-buttons">
                <button class="btn-start" id="start-btn">🎯 开始心理画像</button>
            </div>
            <div class="preview-area" id="preview-area"></div>
            <div class="input-row">
                <button class="btn-icon" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="file" id="file-input" accept="image/*" multiple>
                <input type="text" id="user-input" placeholder="输入你想说的话，按 Enter 发送..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://api.aipsychological86.online"; 
        
        let systemPersona = "";
        let chatHistory = [];
        let selectedImagesBase64 = [];

        // 页面加载时获取 persona.txt
        window.onload = async () => {
            try {
                const response = await fetch('./persona.txt');
                if (response.ok) {
                    systemPersona = await response.text();
                    chatHistory.push({ role: "system", content: systemPersona });
                } else {
                    document.getElementById('persona-warning').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('persona-warning').style.display = 'block';
            }
        };

        // 处理图片上传预览并转换为 Base64
        document.getElementById('file-input').addEventListener('change', function(event) {
            const files = event.target.files;
            const previewArea = document.getElementById('preview-area');
            
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    selectedImagesBase64.push(base64Data);
                    
                    const img = document.createElement('img');
                    img.src = base64Data;
                    previewArea.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            
            if (!text && selectedImagesBase64.length === 0) return;

            // 1. 构建当前消息
            let messageContent = [];
            if (text) messageContent.push({ type: "text", text: text });
            selectedImagesBase64.forEach(base64 => {
                messageContent.push({ type: "image_url", image_url: { url: base64 } });
            });

            const userMessage = { role: "user", content: messageContent };
            chatHistory.push(userMessage);

            // 2. 更新 UI
            appendMessageToUI("user", text, selectedImagesBase64);
            
            // 清空输入框和预览区
            inputField.value = '';
            selectedImagesBase64 = [];
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('send-btn').innerText = '发送中...';
            document.getElementById('send-btn').disabled = true;

            // 3. 发送请求给 Cloudflare Worker
            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: chatHistory })
                });

                const data = await response.json();
                
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: aiReply });
                    appendMessageToUI("assistant", aiReply, []);
                } else {
                    appendMessageToUI("assistant", "API 请求返回异常：" + JSON.stringify(data), []);
                }
            } catch (error) {
                appendMessageToUI("assistant", "请求失败，请检查网络或后端配置。" + error.message, []);
            } finally {
                document.getElementById('send-btn').innerText = '发送';
                document.getElementById('send-btn').disabled = false;
            }
        }

        function appendMessageToUI(role, text, imagesBase64) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            if (imagesBase64 && imagesBase64.length > 0) {
                imagesBase64.forEach(img => {
                    const imgElem = document.createElement('img');
                    imgElem.src = img;
                    msgDiv.appendChild(imgElem);
                });
            }
            if (text) {
                const textDiv = document.createElement('div');
                textDiv.innerText = text;
                msgDiv.appendChild(textDiv);
            }
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 绑定“开始心理画像”按钮（可自定义发送特定的初始 Prompt）
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('user-input').value = "请根据我接下来提供的信息，开始进行心理画像分析。";
            sendMessage();
        });
    </script>
</body>
</html>
