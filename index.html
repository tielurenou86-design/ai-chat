<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Portraits</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 4px;
        }
        
        .header p {
            font-size: 14px;
            color: #6b7280;
        }
        
        .chat-container {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-box { 
            flex: 1;
            overflow-y: auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 20px; 
            line-height: 1.6;
            font-size: 15px;
            animation: fadeInUp 0.3s ease-out;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        .user { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .ai { 
            background: white;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .input-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        
        .quick-btns { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 12px;
            scrollbar-width: none;
        }
        
        .quick-btns::-webkit-scrollbar {
            display: none;
        }
        
        .quick-btn { 
            padding: 12px 24px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 24px; 
            white-space: nowrap; 
            cursor: pointer;
            font-size: 15px;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .quick-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .input-box { 
            display: flex; 
            gap: 12px; 
            align-items: flex-end;
        }
        
        textarea { 
            flex: 1; 
            padding: 14px 18px; 
            border: 2px solid #e5e7eb; 
            border-radius: 20px; 
            outline: none;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
            min-height: 52px;
        }
        
        textarea:focus {
            border-color: #667eea;
        }
        
        .send-btn { 
            padding: 14px 28px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .send-btn:disabled { 
            opacity: 0.6; 
            cursor: not-allowed;
            transform: none;
        }
        
        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 18px;
        }
        
        .typing span {
            width: 10px;
            height: 10px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .error {
            background: #fee2e2 !important;
            color: #dc2626 !important;
        }
        
        .system-info {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            padding: 10px;
        }
        
        @media (max-width: 640px) {
            .chat-container {
                padding: 10px;
            }
            .message {
                max-width: 90%;
                font-size: 14px;
            }
            .header h1 {
                font-size: 20px;
            }
            .quick-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 AI Student Portraits</h1>
        <p>学生AI心理画像分析系统</p>
    </div>
    
    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="message ai">你好！我是AI心理画像助手。我可以帮助你了解自己的心理状态，生成个性化的心理画像报告。点击下方的"开始心理画像"按钮，或直接在输入框中告诉我你想聊什么。</div>
        </div>
        
        <div class="input-section">
            <div class="quick-btns">
                <button class="quick-btn" onclick="quickSend('开始心理画像')">🎯 开始心理画像</button>
            </div>
            
            <div class="input-box">
                <textarea 
                    id="userInput" 
                    placeholder="输入你想说的话，按 Enter 发送..." 
                    rows="1"
                    oninput="autoResize(this)"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()" id="sendBtn">发送</button>
            </div>
        </div>
        
        <div class="system-info">
            Powered by DeepSeek AI · 数据本地存储保护隐私
        </div>
    </div>

    <script>
        // ⚠️ 【Worker URL 配置位置】修改为你的 Cloudflare Worker 地址
        const WORKER_URL = 'https://aipsychological86.online';
        
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let isLoading = false;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function quickSend(text) {
            userInput.value = text;
            autoResize(userInput);
            sendMessage();
        }

        function addMessage(text, sender, isError = false) {
            const div = document.createElement('div');
            div.className = `message ${sender} ${isError ? 'error' : ''}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'message ai typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isLoading) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            isLoading = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: text,
                        model: 'deepseek-chat',
                        temperature: 0.7
                    })
                });

                hideTyping();

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                const reply = data.choices[0].message.content;
                addMessage(reply, 'ai');

            } catch (error) {
                hideTyping();
                addMessage('抱歉，连接出现问题：' + error.message + '\n\n请检查网络连接或稍后重试。', 'ai', true);
                console.error('Error:', error);
            }

            isLoading = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        window.onload = () => {
            userInput.focus();
            
            if (WORKER_URL.includes('你的用户名')) {
                addMessage('⚠️ 警告：请先在代码中设置你的 Cloudflare Worker URL！', 'ai', true);
            }
        };
    </script>
</body>

</html>
