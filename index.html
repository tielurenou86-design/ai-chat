<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Portraits · 多模态版</title>
    <style>
        :root {
            --bg-color: #fdf8e9;
            --primary-color: #6a5acd;
            --primary-hover: #5a4abd;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-color);
        }
        .header {
            text-align: center;
            padding: 20px 0;
            background-color: rgba(255, 255, 255, 0.5);
        }
        .header h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
        }
        .header p {
            font-size: 14px;
            color: #666;
            margin: 0;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .warning-box {
            background-color: #ffe4e1;
            color: #d9534f;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .message {
            max-width: 800px;
            width: 100%;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .message.user {
            background: #e6e6fa;
            align-self: flex-end;
        }
        .message img {
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: transparent;
        }
        .input-box-wrapper {
            background-color: #fff;
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .top-buttons {
            display: flex;
            justify-content: flex-start;
        }
        .btn-start {
            background: linear-gradient(135deg, #7b68ee, #483d8b);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .btn-icon {
            background-color: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        input[type="text"] {
            flex: 1;
            border: 1px solid #eee;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        .btn-send {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-send:hover {
            background-color: var(--primary-hover);
        }
        #file-input {
            display: none;
        }
        .preview-area {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .preview-area img {
            height: 60px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎓 AI Student Portraits · 多模态版</h1>
        <p>学生AI心理画像分析系统（支持视觉分析）</p>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="warning-box" id="persona-warning">
            ⚠️ 人设文件加载失败，请确保存在 persona.txt 文件。
        </div>
        </div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <div class="top-buttons">
                <button class="btn-start" id="start-btn">🎯 开始心理画像</button>
            </div>
            <div class="preview-area" id="preview-area"></div>
            <div class="input-row">
                <button class="btn-icon" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="file" id="file-input" accept="image/*" multiple>
                <input type="text" id="user-input" placeholder="输入你想说的话，按 Enter 发送..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://api.aipsychological86.online"; 
        
        let systemPersona = "";
        let chatHistory = [];
        let selectedImagesBase64 = [];

        // 页面加载时获取 persona.txt
        window.onload = async () => {
            try {
                const response = await fetch('./persona.txt');
                if (response.ok) {
                    systemPersona = await response.text();
                    chatHistory.push({ role: "system", content: systemPersona });
                } else {
                    document.getElementById('persona-warning').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('persona-warning').style.display = 'block';
            }
        };

        // 处理图片上传预览并转换为 Base64
        document.getElementById('file-input').addEventListener('change', function(event) {
            const files = event.target.files;
            const previewArea = document.getElementById('preview-area');
            
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    selectedImagesBase64.push(base64Data);
                    
                    const img = document.createElement('img');
                    img.src = base64Data;
                    previewArea.appendChild(img);
                }
                reader.readAsDataURL(file);
            }
        });

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            
            if (!text && selectedImagesBase64.length === 0) return;

            // 1. 构建当前消息
            let messageContent = [];
            if (text) messageContent.push({ type: "text", text: text });
            selectedImagesBase64.forEach(base64 => {
                messageContent.push({ type: "image_url", image_url: { url: base64 } });
            });

            const userMessage = { role: "user", content: messageContent };
            chatHistory.push(userMessage);

            // 2. 更新 UI
            appendMessageToUI("user", text, selectedImagesBase64);
            
            // 清空输入框和预览区
            inputField.value = '';
            selectedImagesBase64 = [];
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('send-btn').innerText = '发送中...';
            document.getElementById('send-btn').disabled = true;

            // 3. 发送请求给 Cloudflare Worker
            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: chatHistory })
                });

                const data = await response.json();
                
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: aiReply });
                    appendMessageToUI("assistant", aiReply, []);
                } else {
                    appendMessageToUI("assistant", "API 请求返回异常：" + JSON.stringify(data), []);
                }
            } catch (error) {
                appendMessageToUI("assistant", "请求失败，请检查网络或后端配置。" + error.message, []);
            } finally {
                document.getElementById('send-btn').innerText = '发送';
                document.getElementById('send-btn').disabled = false;
            }
        }

        function appendMessageToUI(role, text, imagesBase64) {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            if (imagesBase64 && imagesBase64.length > 0) {
                imagesBase64.forEach(img => {
                    const imgElem = document.createElement('img');
                    imgElem.src = img;
                    msgDiv.appendChild(imgElem);
                });
            }
            if (text) {
                const textDiv = document.createElement('div');
                textDiv.innerText = text;
                msgDiv.appendChild(textDiv);
            }
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 绑定“开始心理画像”按钮（可自定义发送特定的初始 Prompt）
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('user-input').value = "请根据我接下来提供的信息，开始进行心理画像分析。";
            sendMessage();
        });
    </script>
</body>
</html>
